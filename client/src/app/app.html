<nav class="navbar navbar-expand-md navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      <i class="fas fa-book me-2"></i>{{ title() }}
    </a>

    <div class="d-flex align-items-center gap-2 d-md-none">
      <button class="btn btn-outline-light btn-sm" (click)="themeService.toggle()">
        <i class="fas" [class.fa-sun]="themeService.theme() === 'dark'"
                       [class.fa-moon]="themeService.theme() === 'light'"></i>
      </button>
      <button class="navbar-toggler" type="button" (click)="navOpen = !navOpen"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

    <div class="collapse navbar-collapse" [class.show]="navOpen">
      <ul class="navbar-nav ms-auto align-items-md-center gap-2">
        <li class="nav-item d-none d-md-block">
          <button class="btn btn-outline-light btn-sm" (click)="themeService.toggle()">
            <i class="fas" [class.fa-sun]="themeService.theme() === 'dark'"
                           [class.fa-moon]="themeService.theme() === 'light'"></i>
          </button>
        </li>
        @if (auth.isLoggedIn()) {
          <li class="nav-item">
            <a routerLink="/" class="btn btn-outline-light btn-sm" (click)="navOpen = false">
              <i class="fas fa-book me-1"></i>Books
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/my-citations" class="btn btn-outline-light btn-sm" (click)="navOpen = false">
              <i class="fas fa-quote-left me-1"></i>My Citations
            </a>
          </li>
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm" (click)="auth.logout(); navOpen = false">
              <i class="fas fa-sign-out-alt me-1"></i>Logout
            </button>
          </li>
        } @else {
          <li class="nav-item">
            <a routerLink="/login" class="btn btn-outline-light btn-sm" (click)="navOpen = false">
              <i class="fas fa-sign-in-alt me-1"></i>Login
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/register" class="btn btn-light btn-sm" (click)="navOpen = false">
              <i class="fas fa-user-plus me-1"></i>Register
            </a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  <router-outlet />
</div>
