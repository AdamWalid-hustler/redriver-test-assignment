<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Books</h2>
  <a routerLink="/books/add" class="btn btn-primary">
    <i class="fas fa-plus me-1"></i>Add New Book
  </a>
</div>

@if (error()) {
  <div class="alert alert-warning">
    <i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}
  </div>
} @else if (books().length === 0) {
  <div class="text-center py-5 text-muted">
    <div class="spinner-border" role="status"></div>
    <p class="mt-2">Loading...</p>
  </div>
} @else {
  <div class="list-group">
    @for (book of books(); track book.id) {
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <h5 class="mb-1">{{ book.title }}</h5>
          <p class="mb-0 text-muted">
            <i class="fas fa-user me-1"></i>{{ book.author }}
          </p>
        </div>
        <div class="d-flex gap-2">
          <a [routerLink]="['/books/edit', book.id]" class="btn btn-sm btn-outline-primary">
            <i class="fas fa-edit"></i>
          </a>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteBook(book.id)">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    }
  </div>
}
